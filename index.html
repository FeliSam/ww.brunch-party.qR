<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>White Wave - Générateur de Badges</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --violet: #7c3aed; --violet-dark: #5b21b6; --rose: #db2777;
            --rose-light: #f472b6; --cyan: #06b6d4; --cyan-dark: #0891b2;
            --orange: #f59e0b; --orange-light: #fbbf24; --orange-dark: #b45309;
            --dark: #0f0f1a; --dark-card: #1a1a2e; --dark-input: #252540;
            --white: #ffffff; --gray: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #312e81 100%);
            min-height: 100vh; color: var(--white); overflow-x: hidden;
        }
        #root { min-height: 100vh; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scanline { 0% { top: 0%; } 100% { top: 100%; } }
        .animate-fadeInUp { animation: fadeInUp 0.6s ease forwards; }
        .animate-fadeIn { animation: fadeIn 0.4s ease forwards; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        .app-header { text-align: center; padding: 30px 20px 20px; margin-bottom: 10px; }
        .app-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); background: linear-gradient(90deg, var(--cyan), var(--violet), var(--rose), var(--cyan)); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 4s linear infinite; margin-bottom: 8px; }
        .app-header p { color: var(--gray); font-size: clamp(0.9rem, 2.5vw, 1.1rem); }
        .wave-icon { font-size: 2.5rem; display: inline-block; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.5)); }
        .fixed-info-bar { background: linear-gradient(90deg, rgba(124,58,237,0.2), rgba(219,39,119,0.2), rgba(6,182,212,0.2)); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .fixed-info-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: rgba(255,255,255,0.9); }
        .fixed-info-item .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .icon.purple { background: linear-gradient(135deg, var(--violet), var(--violet-dark)); }
        .icon.pink { background: linear-gradient(135deg, var(--rose), var(--rose-light)); }
        .icon.cyan { background: linear-gradient(135deg, var(--cyan), var(--cyan-dark)); }
        .fixed-info-item .label { font-size: 0.65rem; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }
        .fixed-info-item .value { font-weight: 700; color: var(--white); }
        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        @media (max-width: 480px) { .card { padding: 20px; border-radius: 18px; } }
        .card-title { font-size: clamp(1.1rem, 3vw, 1.4rem); font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; background: linear-gradient(90deg, var(--cyan), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--gray); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; }
        .form-group input, .form-group select { width: 100%; padding: 14px 16px; border: 2px solid rgba(255,255,255,0.1); border-radius: 14px; background: var(--dark-input); color: var(--white); font-family: 'Montserrat', sans-serif; font-size: 1rem; transition: all 0.3s ease; appearance: none; -webkit-appearance: none; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--violet); box-shadow: 0 0 0 4px rgba(124,58,237,0.15); }
        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        .select-wrapper { position: relative; }
        .select-wrapper::after { content: '▼'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--violet); font-size: 0.7rem; pointer-events: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 28px; border: none; border-radius: 14px; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        .btn-primary { background: linear-gradient(135deg, var(--violet) 0%, var(--rose) 100%); color: var(--white); width: 100%; padding: 16px; box-shadow: 0 10px 30px rgba(124,58,237,0.4); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(124,58,237,0.5); }
        .btn-primary:active { transform: translateY(0) scale(0.98); }
        .btn-secondary { background: rgba(255,255,255,0.08); color: var(--white); border: 1px solid rgba(255,255,255,0.15); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .btn-cyan { background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan-dark) 100%); color: var(--white); box-shadow: 0 8px 25px rgba(6,182,212,0.3); }
        .btn-cyan:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(6,182,212,0.4); }
        .btn-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: var(--white); box-shadow: 0 8px 25px rgba(16,185,129,0.3); }
        .btn-green:hover { transform: translateY(-2px); }
        .btn-outline { background: transparent; color: var(--gray); border: 1px solid rgba(255,255,255,0.15); }
        .btn-outline:hover { border-color: var(--violet); color: var(--white); }
        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 20px; }
        .btn-group .btn { flex: 1; min-width: 140px; }
        .qr-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        .qr-container { position: relative; padding: 20px; background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(6,182,212,0.1)); border-radius: 24px; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 20px 60px rgba(124,58,237,0.2); }
        .qr-container canvas, .qr-container img { border-radius: 16px; display: block; }
        .qr-label { text-align: center; color: var(--gray); font-size: 0.8rem; margin-top: 10px; }
        .badge-preview { position: relative; width: 100%; max-width: 380px; background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%); border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.4); margin: 0 auto; }
        .badge-preview.n0 { box-shadow: 0 25px 50px rgba(124,58,237,0.3), 0 0 0 4px rgba(124,58,237,0.3); }
        .badge-preview.n1 { box-shadow: 0 25px 50px rgba(219,39,119,0.3), 0 0 0 4px rgba(219,39,119,0.3); }
        .badge-preview.n2 { box-shadow: 0 25px 50px rgba(6,182,212,0.3), 0 0 0 4px rgba(6,182,212,0.3); }
        .badge-preview.n3 { box-shadow: 0 25px 50px rgba(245,158,11,0.3), 0 0 0 4px rgba(245,158,11,0.3); }
        .badge-header { padding: 22px 15px; text-align: center; position: relative; overflow: hidden; }
        .badge-header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.08) 10px, rgba(255,255,255,0.08) 20px); animation: shimmer 6s linear infinite; }
        .badge-preview.n0 .badge-header { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #7c3aed 100%); }
        .badge-preview.n1 .badge-header { background: linear-gradient(135deg, #db2777 0%, #f472b6 50%, #db2777 100%); }
        .badge-preview.n2 .badge-header { background: linear-gradient(135deg, #06b6d4 0%, #67e8f9 50%, #06b6d4 100%); }
        .badge-preview.n3 .badge-header { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%); }
        .badge-event-name { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 4vw, 1.6rem); font-weight: 700; text-transform: uppercase; letter-spacing: 3px; position: relative; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .badge-emoji { font-size: 1.8rem; position: relative; margin-top: 4px; }
        .badge-logo-section { display: flex; justify-content: center; padding: 20px 15px 12px; background: linear-gradient(180deg, #f8f9fa 0%, #fff 100%); }
        .badge-logo-circle { width: 110px; height: 110px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; }
        .badge-logo-circle::after { content: ''; position: absolute; width: 90%; height: 90%; border: 2px dashed; border-radius: 50%; opacity: 0.3; animation: rotate 15s linear infinite; }
        .badge-logo-team { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px; }
        .badge-logo-name { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; }
        .badge-logo-wave { font-size: 1.3rem; margin-top: 2px; }
        .badge-preview.n0 .badge-logo-circle { background: linear-gradient(145deg, #1e1b4b 0%, #4c1d95 100%); border-color: #8b5cf6; }
        .badge-preview.n0 .badge-logo-team { color: #c4b5fd; }
        .badge-preview.n0 .badge-logo-name { color: #fff; }
        .badge-preview.n0 .badge-logo-circle::after { border-color: #8b5cf6; }
        .badge-preview.n1 .badge-logo-circle { background: linear-gradient(145deg, #4a044e 0%, #9d174d 100%); border-color: #ec4899; }
        .badge-preview.n1 .badge-logo-team { color: #f9a8d4; }
        .badge-preview.n1 .badge-logo-name { color: #fff; }
        .badge-preview.n1 .badge-logo-circle::after { border-color: #ec4899; }
        .badge-preview.n2 .badge-logo-circle { background: linear-gradient(145deg, #083344 0%, #155e75 100%); border-color: #22d3ee; }
        .badge-preview.n2 .badge-logo-team { color: #a5f3fc; }
        .badge-preview.n2 .badge-logo-name { color: #fff; }
        .badge-preview.n2 .badge-logo-circle::after { border-color: #22d3ee; }
        .badge-preview.n3 .badge-logo-circle { background: linear-gradient(145deg, #78350f 0%, #b45309 100%); border-color: #fbbf24; }
        .badge-preview.n3 .badge-logo-team { color: #fde68a; }
        .badge-preview.n3 .badge-logo-name { color: #fff; }
        .badge-preview.n3 .badge-logo-circle::after { border-color: #fbbf24; }
        .badge-info { padding: 15px 20px 18px; background: #fff; }
        .badge-info-row { display: flex; align-items: center; margin-bottom: 10px; padding: 10px 12px; background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%); border-radius: 10px; border-left: 3px solid; }
        .badge-info-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; justify-content: center; align-items: center; margin-right: 12px; font-size: 13px; flex-shrink: 0; color: #fff; }
        .badge-info-label { font-size: 0.6rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .badge-info-value { font-size: 0.85rem; font-weight: 700; color: #1e293b; word-break: break-word; }
        .badge-role-tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-left: 6px; color: #fff; }
        .badge-preview.n0 .badge-info-row { border-left-color: #8b5cf6; }
        .badge-preview.n0 .badge-info-icon { background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 100%); }
        .badge-preview.n0 .badge-role-tag { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .badge-preview.n1 .badge-info-row { border-left-color: #ec4899; }
        .badge-preview.n1 .badge-info-icon { background: linear-gradient(135deg, #9d174d 0%, #db2777 100%); }
        .badge-preview.n1 .badge-role-tag { background: linear-gradient(135deg, #db2777 0%, #f472b6 100%); }
        .badge-preview.n2 .badge-info-row { border-left-color: #22d3ee; }
        .badge-preview.n2 .badge-info-icon { background: linear-gradient(135deg, #155e75 0%, #0891b2 100%); }
        .badge-preview.n2 .badge-role-tag { background: linear-gradient(135deg, #0891b2 0%, #22d3ee 100%); }
        .badge-preview.n3 .badge-info-row { border-left-color: #fbbf24; }
        .badge-preview.n3 .badge-info-icon { background: linear-gradient(135deg, #b45309 0%, #f59e0b 100%); }
        .badge-preview.n3 .badge-role-tag { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); color: #78350f; }
        .badge-footer { padding: 12px; text-align: center; }
        .badge-footer-text { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; }
        .badge-footer-line { width: 50px; height: 2px; margin: 6px auto; border-radius: 1px; }
        .badge-preview.n0 .badge-footer { background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 100%); }
        .badge-preview.n0 .badge-footer-text { color: #c4b5fd; }
        .badge-preview.n0 .badge-footer-line { background: linear-gradient(90deg, transparent, #8b5cf6, transparent); }
        .badge-preview.n1 .badge-footer { background: linear-gradient(135deg, #4a044e 0%, #9d174d 100%); }
        .badge-preview.n1 .badge-footer-text { color: #f9a8d4; }
        .badge-preview.n1 .badge-footer-line { background: linear-gradient(90deg, transparent, #ec4899, transparent); }
        .badge-preview.n2 .badge-footer { background: linear-gradient(135deg, #083344 0%, #155e75 100%); }
        .badge-preview.n2 .badge-footer-text { color: #a5f3fc; }
        .badge-preview.n2 .badge-footer-line { background: linear-gradient(90deg, transparent, #22d3ee, transparent); }
        .badge-preview.n3 .badge-footer { background: linear-gradient(135deg, #78350f 0%, #b45309 100%); }
        .badge-preview.n3 .badge-footer-text { color: #fde68a; }
        .badge-preview.n3 .badge-footer-line { background: linear-gradient(90deg, transparent, #fbbf24, transparent); }
        .badge-priority { position: absolute; top: 0; right: 0; padding: 6px 12px; border-bottom-left-radius: 14px; font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; z-index: 5; color: #fff; }
        .badge-preview.n0 .badge-priority { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .badge-preview.n1 .badge-priority { background: linear-gradient(135deg, #db2777 0%, #f472b6 100%); }
        .badge-preview.n2 .badge-priority { background: linear-gradient(135deg, #06b6d4 0%, #67e8f9 100%); }
        .badge-preview.n3 .badge-priority { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); color: #78350f; }
        .generated-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }
        @media (max-width: 900px) { .generated-layout { grid-template-columns: 1fr; } }
        .page-scan .generated-layout { grid-template-columns: 1fr; }
        .page-scan .form-section { display: none; }
        .scan-verified-banner { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; padding: 16px 24px; border-radius: 16px; text-align: center; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 30px rgba(16,185,129,0.3); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, var(--violet), var(--rose)); color: #fff; padding: 14px 28px; border-radius: 14px; font-weight: 600; font-size: 0.9rem; box-shadow: 0 15px 40px rgba(124,58,237,0.4); z-index: 1000; opacity: 0; transition: all 0.4s ease; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .hidden { display: none !important; }
        .participants-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .participants-table th { background: rgba(124,58,237,0.2); color: var(--white); padding: 12px 16px; text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; border-bottom: 2px solid rgba(124,58,237,0.3); }
        .participants-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; color: rgba(255,255,255,0.9); }
        .participants-table tr:hover td { background: rgba(255,255,255,0.03); cursor: pointer; }
        .participants-table .role-cell { display: flex; align-items: center; gap: 8px; }
        .role-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .role-dot.n0 { background: linear-gradient(135deg, #7c3aed, #a78bfa); box-shadow: 0 0 8px rgba(124,58,237,0.5); }
        .role-dot.n1 { background: linear-gradient(135deg, #db2777, #f472b6); box-shadow: 0 0 8px rgba(219,39,119,0.5); }
        .role-dot.n2 { background: linear-gradient(135deg, #06b6d4, #67e8f9); box-shadow: 0 0 8px rgba(6,182,212,0.5); }
        .role-dot.n3 { background: linear-gradient(135deg, #f59e0b, #fbbf24); box-shadow: 0 0 8px rgba(245,158,11,0.5); }
        .participants-count { display: inline-flex; align-items: center; gap: 8px; background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); border-radius: 12px; padding: 8px 16px; font-size: 0.85rem; font-weight: 600; color: var(--white); margin-bottom: 20px; }
        .search-box { width: 100%; padding: 12px 16px; border: 2px solid rgba(255,255,255,0.1); border-radius: 14px; background: var(--dark-input); color: var(--white); font-family: 'Montserrat', sans-serif; font-size: 0.95rem; margin-bottom: 20px; }
        .search-box:focus { outline: none; border-color: var(--violet); box-shadow: 0 0 0 4px rgba(124,58,237,0.15); }
        .search-box::placeholder { color: rgba(255,255,255,0.3); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 2000; animation: fadeIn 0.3s ease; }
        .modal-content { background: linear-gradient(145deg, var(--dark-card), var(--dark)); border: 1px solid rgba(124,58,237,0.3); border-radius: 24px; padding: 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); animation: fadeInUp 0.4s ease; }
        .modal-content h3 { font-size: 1.3rem; margin-bottom: 10px; background: linear-gradient(90deg, var(--cyan), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .modal-content .lock-icon { font-size: 3rem; margin-bottom: 15px; display: block; }

        .modal-content input:focus { outline: none; border-color: var(--violet); box-shadow: 0 0 0 4px rgba(124,58,237,0.15); }
        .modal-content .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: -10px; margin-bottom: 15px; min-height: 20px; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-bar .btn { flex: 1; min-width: 120px; font-size: 0.8rem; padding: 12px 16px; }
        .scanner-container { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 24px; overflow: hidden; border: 2px solid rgba(124,58,237,0.3); box-shadow: 0 20px 60px rgba(124,58,237,0.2); }

            const [toastMsg, setToastMsg] = useState('');
            const [toastVisible, setToastVisible] = useState(false);
            const level = data.level || 0;
            const encoded = btoa(JSON.stringify(data));
            const badgeUrl = window.location.origin + window.location.pathname + '#' + encoded;

            const showToast = (msg) => { setToastMsg(msg); setToastVisible(true); setTimeout(() => setToastVisible(false), 3000); };

            const handleDownloadQR = () => {
                const canvas = document.querySelector('.qr-container canvas');
                if (!canvas) { showToast('QR non disponible'); return; }
                const link = document.createElement('a');
                link.download = `badge-qr-${data.lastName}-${data.firstName}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('✅ QR Code téléchargé !');
            };

            const handleShare = async () => {
                const shareData = { title: `Badge ${EVENT_NAME} - ${data.firstName} ${data.lastName}`, text: `Voici mon badge pour ${EVENT_NAME} du ${EVENT_DATE} !`, url: badgeUrl };
                if (navigator.share) { try { await navigator.share(shareData); showToast('✅ Partagé !'); } catch (e) {} }
                else { navigator.clipboard.writeText(badgeUrl); showToast('📋 Lien copié !'); }
            };

            const handleScreenshot = () => {
    alert(`📸 Pour capturer le badge :

• iPhone : Volume Haut + Power  
• Android : Power + Volume Bas  
• PC : Win + Shift + S  
• Mac : Cmd + Shift + 4`);
};

            const handlePrint = () => { window.print(); };

            return React.createElement('div', { className: 'app-container' },
                React.createElement('div', { className: 'app-header' },
                    React.createElement('div', { className: 'wave-icon' }, '🌊'),
                    React.createElement('h1', null, 'White Wave'),
                    React.createElement('p', null, 'Badge généré avec succès !')
                ),
                React.createElement('div', { className: 'generated-layout' },
                    React.createElement('div', { className: 'animate-fadeInUp' }, React.createElement(Badge, { data })),
                    React.createElement('div', { className: 'card animate-fadeInUp', style: { animationDelay: '0.2s' } },
                        React.createElement('div', { className: 'card-title' }, '📱 QR Code'),
                        React.createElement('div', { className: 'qr-wrapper' },
                            React.createElement(StyledQRCode, { url: badgeUrl, level }),
                            React.createElement('div', { className: 'qr-label' }, 'Scannez ce QR code pour vérifier le badge')
                        ),
                        React.createElement('div', { className: 'btn-group' },
                            React.createElement('button', { className: 'btn btn-cyan', onClick: handleDownloadQR }, '💾 Télécharger QR'),
                            React.createElement('button', { className: 'btn btn-green', onClick: handleShare }, '🔗 Partager'),
                            React.createElement('button', { className: 'btn btn-secondary', onClick: handleScreenshot }, '📸 Capture'),
                            React.createElement('button', { className: 'btn btn-secondary', onClick: handlePrint }, '🖨️ Imprimer')
                        ),
                        React.createElement('div', { style: { marginTop: 20, display: 'flex', gap: 10 } },
                            React.createElement('button', { className: 'btn btn-outline', onClick: onBack, style: { flex: 1 } }, '← Retour'),
                            React.createElement('button', { className: 'btn btn-primary', onClick: onNew, style: { flex: 1 } }, '🆕 Nouveau Badge')
                        )
                    )
                ),
                React.createElement(Toast, { message: toastMsg, visible: toastVisible })
            );
        }

        function ScanPage({ data, onBack }) {
            const genderedRole = getGenderedRole(data.role, data.gender);
            const level = data.level || 0;
            const config = LEVEL_CONFIG[level];

            return React.createElement('div', { className: 'app-container page-scan' },
                React.createElement('div', { className: 'app-header' },
                    React.createElement('div', { className: 'wave-icon' }, '🌊'),
                    React.createElement('h1', null, 'White Wave'),
                    React.createElement('p', null, 'Vérification de badge')
                ),
                React.createElement('div', { className: 'scan-verified-banner animate-fadeIn' },
                    React.createElement('span', { style: { fontSize: '1.5rem' } }, '✅'),
                    React.createElement('span', null, 'Badge vérifié ! Ce badge est authentique.')
                ),
                React.createElement('div', { className: 'generated-layout' },
                    React.createElement('div', { className: 'animate-fadeInUp' }, React.createElement(Badge, { data })),
                    React.createElement('div', { className: 'card animate-fadeInUp', style: { animationDelay: '0.2s' } },
                        React.createElement('div', { className: 'card-title' }, '🔒 Informations de vérification'),
                        React.createElement('div', { style: { color: 'var(--gray)', fontSize: '0.9rem', lineHeight: 1.8, marginBottom: 20 } },
                            React.createElement('p', null, React.createElement('strong', { style: { color: '#fff' } }, 'Événement : '), EVENT_NAME),
                            React.createElement('p', null, React.createElement('strong', { style: { color: '#fff' } }, 'Date : '), EVENT_DATE),
                            React.createElement('p', null, React.createElement('strong', { style: { color: '#fff' } }, 'Équipe : '), TEAM_NAME),
                            React.createElement('p', null, React.createElement('strong', { style: { color: '#fff' } }, 'Participant : '), data.firstName + ' ' + data.lastName),
                            React.createElement('p', null, React.createElement('strong', { style: { color: '#fff' } }, 'Rôle : '), data.role),
                            React.createElement('p', null, React.createElement('strong', { style: { color: '#fff' } }, 'Niveau : '), genderedRole)
                        ),
                        React.createElement('div', { style: { background: 'rgba(16,185,129,0.1)', border: '1px solid rgba(16,185,129,0.3)', borderRadius: 12, padding: 16, textAlign: 'center' } },
                            React.createElement('div', { style: { fontSize: '2rem', marginBottom: 8 } }, '✅'),
                            React.createElement('div', { style: { color: '#10b981', fontWeight: 700, fontSize: '1rem' } }, 'Badge Valide'),
                            React.createElement('div', { style: { color: 'var(--gray)', fontSize: '0.75rem', marginTop: 4 } }, 'Vérifié le ' + new Date().toLocaleDateString('fr-FR'))
                        ),
                        React.createElement('button', { className: 'btn btn-outline', onClick: onBack, style: { marginTop: 20, width: '100%' } }, "← Retour à l'accueil")
                    )
                )
            );
        }

        function ScannerPage({ onScan, onBack }) {
            const [scanning, setScanning] = useState(false);

            useEffect(() => {
                if (!scanning) return;
                const html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        html5QrCode.stop();
                        setScanning(false);
                        try {
                            const hash = decodedText.split('#')[1];
                            if (hash) { const data = JSON.parse(atob(hash)); onScan(data); }
                        } catch (e) { alert('QR Code invalide'); }
                    },
                    (error) => {}
                );
                return () => { html5QrCode.stop().catch(() => {}); };
            }, [scanning]);

            return React.createElement('div', { className: 'app-container' },
                React.createElement('div', { className: 'app-header' },
                    React.createElement('div', { className: 'wave-icon' }, '🌊'),
                    React.createElement('h1', null, 'White Wave'),
                    React.createElement('p', null, 'Scanner un badge')
                ),
                React.createElement('div', { className: 'card animate-fadeInUp', style: { maxWidth: 500, margin: '0 auto' } },
                    React.createElement('div', { className: 'card-title' }, '📷 Scanner un QR Code'),
                    !scanning ?
                        React.createElement('div', { style: { textAlign: 'center', padding: '40px 20px' } },
                            React.createElement('div', { style: { fontSize: '4rem', marginBottom: 20, animation: 'float 3s ease-in-out infinite' } }, '📷'),
                            React.createElement('p', { style: { color: 'var(--gray)', marginBottom: 25, lineHeight: 1.6 } }, "Placez le QR code d'un badge devant votre caméra pour le vérifier."),
                            React.createElement('button', { className: 'btn btn-primary', onClick: () => setScanning(true) }, '📷 Activer la caméra'),
                            React.createElement('button', { className: 'btn btn-outline', onClick: onBack, style: { marginTop: 12, width: '100%' } }, '← Retour')
                        ) :
                        React.createElement('div', null,
                            React.createElement('div', { id: "reader", style: { width: '100%', borderRadius: 16, overflow: 'hidden' } }),
                            React.createElement('button', { className: 'btn btn-outline', onClick: () => setScanning(false), style: { marginTop: 15, width: '100%' } }, '❌ Arrêter le scan')
                        )
                )
            );
        }

        function App() {
            const [page, setPage] = useState('form');
            const [badgeData, setBadgeData] = useState(null);
            const [scanData, setScanData] = useState(null);
            const [selectedParticipant, setSelectedParticipant] = useState(null);

            useEffect(() => {
                const hash = window.location.hash.slice(1);
                if (hash) {
                    try {
                        const data = JSON.parse(atob(hash));
                        setScanData(data);
                        setPage('scan');
                    } catch (e) {
                        console.error('Invalid QR data');
                    }
                }
            }, []);

            const handleGenerate = (data) => { setBadgeData(data); setPage('generated'); window.scrollTo(0, 0); };
            const handleScan = (data) => { setScanData(data); setPage('scan'); window.scrollTo(0, 0); };
            const handleBack = () => { setPage('form'); window.location.hash = ''; window.scrollTo(0, 0); };
            const handleNew = () => { setBadgeData(null); setPage('form'); window.location.hash = ''; window.scrollTo(0, 0); };
            const handleOpenScanner = () => { setPage('scanner'); window.scrollTo(0, 0); };
            const handleOpenList = () => { setPage('list'); window.scrollTo(0, 0); };
            const handleViewParticipant = (p) => { setSelectedParticipant(p); setPage('participant'); window.scrollTo(0, 0); };
            const handleBackFromParticipant = () => { setSelectedParticipant(null); setPage('list'); window.scrollTo(0, 0); };

            const showFabs = page !== 'scanner' && page !== 'scan' && page !== 'participant';

            return React.createElement('div', null,
                page === 'form' && React.createElement(FormPage, { onGenerate: handleGenerate }),
                page === 'generated' && React.createElement(GeneratedPage, { data: badgeData, onBack: handleBack, onNew: handleNew }),
                page === 'scan' && React.createElement(ScanPage, { data: scanData, onBack: handleNew }),
                page === 'scanner' && React.createElement(ScannerPage, { onScan: handleScan, onBack: handleBack }),
                page === 'list' && React.createElement(ParticipantsPage, { onBack: handleBack, onViewParticipant: handleViewParticipant }),
                page === 'participant' && selectedParticipant && React.createElement(ParticipantDetailPage, { participant: selectedParticipant, onBack: handleBackFromParticipant }),
                showFabs && React.createElement('div', null,
                    React.createElement('button', { className: 'fab fab-home', onClick: handleBack, title: 'Accueil' }, '🏠'),
                    React.createElement('button', { className: 'fab fab-list', onClick: handleOpenList, title: 'Liste participants' }, '📋'),
                    React.createElement('button', { className: 'fab fab-scan', onClick: handleOpenScanner, title: 'Scanner QR' }, '📷')
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
